apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: mariadb
  namespace: mariadb

spec:
  project: default

  source:
    repoURL: https://charts.mariadb.org/mariadb-operator
    chart: mariadb
    targetRevision: 0.1.0

    helm:
      values: |
        auth:
          rootPassword: example-root-password
          database: warehouse
          username: warehouse
          password: example-password

        primary:
          persistence:
            enabled: true
            size: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: mariadb

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
